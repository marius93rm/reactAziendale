name: Build Module 1 commented code slides

on:
  push:
    paths:
      - 'materiali/slides/01-architettura-react/generator.part-*'
      - '.github/workflows/build-modulo1-code-slides.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install presentation generator
        run: npm install --no-save --package-lock=false pptxgenjs@4.0.0

      - name: Rebuild generator source
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const base = 'materiali/slides/01-architettura-react';

          const rawParts = [
            'generator.part-00',
            'generator.part-01',
            'generator.part-02',
          ];

          const wrappedParts = [
            'generator.part-03.js',
            'generator.part-04.js',
            'generator.part-05.js',
            'generator.part-06.js',
            'generator.part-07.js',
            'generator.part-08.js',
          ];

          function readPart(fileName) {
            const partPath = path.join(base, fileName);

            if (!fs.existsSync(partPath)) {
              throw new Error(`Missing generator fragment: ${partPath}`);
            }

            console.log(`Appending ${partPath}`);
            return fs.readFileSync(partPath, 'utf8');
          }

          function decodeWrappedPart(fileName) {
            const raw = readPart(fileName).replace(/\r\n/g, '\n').trimEnd();
            const prefix = 'module.exports = "';
            const suffix = '";';

            if (!raw.startsWith(prefix) || !raw.endsWith(suffix)) {
              throw new Error(`Invalid wrapped generator fragment: ${fileName}`);
            }

            const body = raw.slice(prefix.length, -suffix.length);

            // The fragments were stored as quoted JavaScript strings, but contain
            // physical newlines. Escape only those physical newlines, then let
            // JSON.parse decode the original escaped quotes and backslashes.
            const validJsonString = `"${body.replace(/\n/g, '\\n')}"`;
            return JSON.parse(validJsonString);
          }

          const source = [
            ...rawParts.map(readPart),
            ...wrappedParts.map(decodeWrappedPart),
          ].join('');

          const output = path.join(base, '.generate_modulo1_code_deck.js');
          fs.writeFileSync(output, source, 'utf8');
          console.log(`Generator rebuilt at ${output} (${source.length} characters)`);
          NODE

      - name: Validate generator syntax
        run: node --check materiali/slides/01-architettura-react/.generate_modulo1_code_deck.js

      - name: Generate PowerPoint
        shell: bash
        run: |
          OUTPUT_PATH=materiali/slides/01-architettura-react/Modulo_1_Esempi_Commentati_Codice.pptx \
            node materiali/slides/01-architettura-react/.generate_modulo1_code_deck.js
          test -s materiali/slides/01-architettura-react/Modulo_1_Esempi_Commentati_Codice.pptx
          rm materiali/slides/01-architettura-react/.generate_modulo1_code_deck.js

      - name: Commit generated presentation
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add materiali/slides/01-architettura-react/Modulo_1_Esempi_Commentati_Codice.pptx
          if git diff --cached --quiet; then
            echo 'Presentation is already up to date.'
            exit 0
          fi
          git commit -m 'Build Module 1 commented code slides'
          git push
